# ============================================================================
# Reusable Workflow：构建 + SLSA Provenance + 上传
#
# 这是达到 SLSA v1 Build Level 3 的【关键】：把【整个 iOS 构建过程】放进一个
# 集中管理的 reusable workflow。生成的 provenance 的 builder.id 会绑定到本文件
# 的引用（owner/repo/.github/workflows/build-sign-attest.yml@ref），调用方仓库
# 无法篡改，因此 provenance 不可伪造 —— 这正是 L2 与 L3 的分界线。
#
# 验证时用：
#   gh attestation verify ExampleApp.ipa \
#     --repo <owner>/<repo> \
#     --signer-workflow <owner>/<repo>/.github/workflows/build-sign-attest.yml
# ============================================================================
name: Build, Sign & Attest (reusable)

on:
  workflow_call:
    inputs:
      upload-to-testflight:
        description: "构建并 attest 后是否上传到 TestFlight"
        type: boolean
        default: false
    # secrets 通过调用方的 `secrets: inherit` 传入，这里直接用 ${{ secrets.* }} 引用。

permissions: {} # 默认全部关闭，权限在 job 级最小化授予

jobs:
  build-sign-attest:
    # iOS 必须在 macOS runner（Xcode）。macOS runner 是 GitHub 托管的 ephemeral 环境，
    # 满足 SLSA L3 对"隔离、一次性构建环境"的要求。
    runs-on: macos-26 # App Store 上传要求 iOS 26 SDK，需 Xcode 26（macos-26 runner 默认携带）

    permissions:
      contents: read
      id-token: write # Sigstore OIDC：签发短期签名证书
      attestations: write # 写入 artifact attestation

    env:
      # —— 非敏感配置（用 repository variables 注入）——
      APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
      FASTLANE_TEAM_ID: ${{ vars.FASTLANE_TEAM_ID }}
      FASTLANE_ITC_TEAM_ID: ${{ vars.FASTLANE_ITC_TEAM_ID }}
      FASTLANE_APP_ID: ${{ vars.FASTLANE_APP_ID }}
      MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
      # —— CI 中强制 match 只读，不登录 Developer Portal，绕过 2FA ——
      MATCH_READONLY: "true"
      # —— 敏感凭证（用 secrets 注入）——
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      # 注：MATCH_GIT_BASIC_AUTHORIZATION 不再用长期 PAT，而是在下方 step 里由
      # GitHub App 签发的【短期】token 动态组装后写入 $GITHUB_ENV（见 "签发证书仓库短期访问 token"）。
      FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 选择 Xcode 版本
        run: |
          # App Store 上传要求 iOS 26 SDK（Xcode 26+）。runner 上 Xcode 路径带具体小版本
          # （如 Xcode_26.2.app），动态选最新的 26.x；找不到再退回 runner 上最新的 Xcode。
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$XCODE" ] && XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "使用 $XCODE"
          sudo xcode-select -switch "$XCODE"

      - name: 安装 Ruby 与 fastlane 依赖
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: "3.3" # 仓库无 .ruby-version/.tool-versions、Gemfile 也未声明 ruby，必须显式指定
          bundler-cache: true

      # 不用 brew 安装 xcodegen，改为下载官方 release 并校验 sha256：
      #   ① 绕开 runner 预装的未受信任 tap（aws/tap、azure/bicep）触发的 brew 告警；
      #   ② pin 版本 + 校验摘要 → 可复现、防篡改，与本项目"action 全部 pin SHA"一致。
      # 升级：改 XCODEGEN_VERSION，并在本机对新版 zip 跑 `shasum -a 256` 同步 XCODEGEN_SHA256。
      - name: 安装 XcodeGen（pin 版本 + 校验摘要）并生成 .xcodeproj
        env:
          XCODEGEN_VERSION: "2.45.4"
          XCODEGEN_SHA256: "090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef"
        run: |
          curl -fsSL "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" -o /tmp/xcodegen.zip
          echo "${XCODEGEN_SHA256}  /tmp/xcodegen.zip" | shasum -a 256 -c -
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          cd ExampleApp && /tmp/xcodegen-dist/xcodegen/bin/xcodegen generate

      # —— 用 GitHub App 签发【短期】token 访问私有证书仓库 ——
      # 取代长期 PAT：installation token 仅约 1 小时有效，权限锁死到"只读这一个证书仓库"。
      # App 的 private key 是唯一长期 secret，但作用域远窄于一个能读账号下所有仓库的 PAT。
      # （GitHub Actions OIDC 无法直接 clone 私有 repo，故 git storage 下用 App token，
      #  而真·OIDC 继续服务于下方的 attest-build-provenance 签名。）
      - name: 签发证书仓库短期访问 token
        id: cert-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CERT_REPO_APP_CLIENT_ID }}
          private-key: ${{ secrets.CERT_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.CERT_REPO_NAME }} # 例：ios-certificates（不带 owner）

      - name: 用短期 token 组装 match git 凭证
        run: |
          # match 读取 base64("用户名:令牌")；GitHub App token 的用户名固定为 x-access-token。
          AUTH=$(printf 'x-access-token:%s' '${{ steps.cert-token.outputs.token }}' | base64 | tr -d '\n')
          echo "::add-mask::$AUTH"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$AUTH" >> "$GITHUB_ENV"

      - name: 构建签名 .ipa
        run: bundle exec fastlane ios build

      - name: 打印产物 SHA-256（写入构建日志便于核对）
        id: digest
        run: |
          DIGEST=$(shasum -a 256 build/ExampleApp.ipa | awk '{print $1}')
          echo "sha256=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ExampleApp.ipa  sha256=$DIGEST"

      # —— SLSA Provenance：对最终 .ipa 生成并签名 attestation ——
      # 放在 build 之后、upload 之前，确保被证明的就是真正分发的那个产物。
      # 注：本仓库所有第三方 action 均已 pin 到 commit SHA（# 后注明版本号），升级时同步更新 SHA 与注释。
      - name: 生成 SLSA Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: build/ExampleApp.ipa

      - name: 上传到 TestFlight（可选）
        if: ${{ inputs.upload-to-testflight }}
        run: bundle exec fastlane ios upload

      - name: 归档 .ipa 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ExampleApp-ipa
          path: build/ExampleApp.ipa
          if-no-files-found: error
