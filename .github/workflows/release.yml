# ============================================================================
# Caller Workflow：触发发布
#
# 本文件只负责"何时发布"，真正的构建/签名/attest 逻辑全部封装在 reusable
# workflow（build-sign-attest.yml）中。这种"调用方 + 可复用构建工作流"的分层
# 正是 SLSA L3 所要求的结构 —— 构建定义集中、可被组织内多个仓库共享与审计。
# ============================================================================
name: Release

on:
  # 推送形如 v1.2.3 的 tag 时自动发布
  push:
    tags:
      - "v*"
  # 手动触发，可选择是否上传 TestFlight
  workflow_dispatch:
    inputs:
      upload-to-testflight:
        description: "构建后是否上传到 TestFlight"
        type: boolean
        default: false

jobs:
  release:
    # reusable workflow 能获得的权限不能超过【调用方 job】授予的范围，必须在这里显式下放，
    # 否则 build-sign-attest 请求的 id-token/attestations 会被判 none → workflow 无效（startup_failure）。
    permissions:
      contents: read
      id-token: write # Sigstore OIDC：attest-build-provenance 必需
      attestations: write # 写入 artifact attestation
    uses: ./.github/workflows/build-sign-attest.yml
    with:
      # tag 触发时默认上传；手动触发时听从输入
      upload-to-testflight: ${{ github.event_name == 'push' || inputs.upload-to-testflight }}
    # 把本仓库的所有 secrets 透传给 reusable workflow
    secrets: inherit
