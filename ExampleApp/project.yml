# XcodeGen 配置：由它生成 ExampleApp.xcodeproj（工程文件不入库，避免 pbxproj 冲突）。
# 生成：cd ExampleApp && xcodegen generate
name: ExampleApp

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # 手动签名：由 fastlane match + gym 注入证书/profile。
    CODE_SIGN_STYLE: Manual
    # 团队 ID 留空，CI 通过 FASTLANE_TEAM_ID / gym export options 提供。
    DEVELOPMENT_TEAM: ""

targets:
  ExampleApp:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        # bundle id 走 APP_IDENTIFIER 环境变量注入，真实值不入库（与 Appfile/Matchfile 同源）。
        # 注意：XcodeGen 仅在 env 已设置时替换 ${APP_IDENTIFIER}，未设置会原样保留导致空 bundle id——
        # 故本地一律经 `just`（带占位回退后再 export 给 xcodegen）生成，CI 由 vars.APP_IDENTIFIER 注入。
        PRODUCT_BUNDLE_IDENTIFIER: ${APP_IDENTIFIER}
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "SLSA Example"
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"

# 显式声明 shared scheme，供 fastlane gym（scheme: ExampleApp）使用。
schemes:
  ExampleApp:
    build:
      targets:
        ExampleApp: all
    archive:
      config: Release
    run:
      config: Debug
